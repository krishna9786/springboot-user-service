name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Package with Maven
        run: mvn clean package -DskipTests=true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: target/

      - name: Copy JAR File to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar"
          target: "~/user-service"
          strip_components: 1

      - name: Deploy and Run on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/user-service
            cd ~/user-service
            
            # Safely shut down any old running instances
            pkill -f 'springboot-user-service.*.jar' || true
            pkill -f 'java -jar.*.jar' || true
            
            # Start the new application completely detached
            nohup java -jar *.jar > app.log 2>&1 &
            
            # Detach the background process from the session
            disown
            
            echo "Deployment triggered successfully!"